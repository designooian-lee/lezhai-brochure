server {
    listen 8080;
    server_name _;
    root /app/public;
    index index.php;
    client_max_body_size 520m;
    location ~ ^/(?:_astro|brand|fonts|images)/ {
        root /app/storage/website-dist;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location ~ ^/brochure/(?:assets|uploads)/ {
        rewrite ^/brochure(/.*)$ $1 break;
        try_files $uri =404;
    }
    location / {
        try_files $uri /index.php$is_args$args;
    }
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_pass 127.0.0.1:9000;
    }
    location ~ /\. { deny all; }
}
